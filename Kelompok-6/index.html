<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Marker - Kelompok 6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Kelompok 6</p>
        <h1>Map Marker</h1>
        <p class="lede">Marker dimuat dari file JSON agar tim bisa menambah koordinat secara manual tanpa backend.</p>
      </div>
    </section>

    <section class="filters" aria-label="Filter kategori marker">
      <button type="button" class="filter-btn active" data-category="all">Semua</button>
      <button type="button" class="filter-btn" data-category="wisata">Wisata</button>
      <button type="button" class="filter-btn" data-category="kuliner">Kuliner</button>
      <button type="button" class="filter-btn" data-category="sejarah">Sejarah</button>
      <button type="button" class="filter-btn" data-category="ibadah">Ibadah</button>
    </section>

    <section class="legend" aria-label="Legenda kategori marker">
      <div class="legend-item"><span class="legend-dot wisata"></span> Wisata</div>
      <div class="legend-item"><span class="legend-dot kuliner"></span> Kuliner</div>
      <div class="legend-item"><span class="legend-dot sejarah"></span> Sejarah</div>
      <div class="legend-item"><span class="legend-dot ibadah"></span> Ibadah</div>
    </section>

    <section class="stats" aria-live="polite">
      <article>
        <span class="label">Marker aktif</span>
        <strong id="marker-count">0</strong>
      </article>
      <article>
        <span class="label">Status data</span>
        <strong id="status-text">Memuat marker dari markers.json</strong>
      </article>
    </section>

    <section class="map-frame">
      <div id="map" aria-label="Peta interaktif"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
